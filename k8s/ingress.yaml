apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: book-api-ingress
  namespace: book-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: book-api-service
                port:
                  number: 3000