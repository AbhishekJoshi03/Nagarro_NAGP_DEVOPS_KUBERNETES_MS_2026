apiVersion: v1
kind: ConfigMap
metadata:
  name: book-api-mysql-config
  namespace: book-app
data:
  init.sql: |-
    CREATE DATABASE IF NOT EXISTS books_db;
    USE books_db;

    CREATE TABLE IF NOT EXISTS books (
      id INT PRIMARY KEY AUTO_INCREMENT,
      title VARCHAR(255) NOT NULL,
      author VARCHAR(255) NOT NULL,
      published_year INT,
      genre VARCHAR(100)
    );
    
